<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Portfolio</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<header>
    <h1>My Portfolio</h1>
    <nav>
        <a href="#about">About</a>
        <a href="#projects">Projects</a>
        <a href="#contact">Contact</a>
    </nav>
</header>

<section id="hero">
    <h2>Hello, I'm a Developer 👋</h2>
    <button onclick="scrollToSection('projects')">View My Work</button>
</section>

<section id="about">
    <h2>About Me</h2>
    <img src="https://via.placeholder.com/150" alt="Profile picture">
    <p>I am learning full-stack development and building projects using C#, HTML, CSS, and JavaScript.</p>
</section>

<section id="projects">
    <h2>Projects</h2>

    <div class="project" onclick="showDetails('Inventory Management System built using C#')">
        <h3>Inventory System</h3>
        <p>Click to learn more</p>
    </div>

    <div class="project" onclick="showDetails('Student Grade Management System project')">
        <h3>Student Manager</h3>
        <p>Click to learn more</p>
    </div>

</section>

<section id="contact">
    <h2>Contact</h2>
    <input type="text" id="name" placeholder="Enter your name">
    <button onclick="greetUser()">Submit</button>
    <p id="message"></p>
</section>

<footer>
    <p>© 2026 My Portfolio</p>
</footer>

<script src="script.js"></script>
</body>
</html>
